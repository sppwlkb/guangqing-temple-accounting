<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宮廟軟體 - 系統健康檢查</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-icon {
            font-size: 32px;
            margin-right: 15px;
        }
        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .health-status {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        .status-good {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .indicator-good { background: #28a745; }
        .indicator-warning { background: #ffc107; }
        .indicator-error { background: #dc3545; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; color: white; }
        .btn:hover { opacity: 0.9; }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        .test-pass {
            background: #d4edda;
            color: #155724;
        }
        .test-fail {
            background: #f8d7da;
            color: #721c24;
        }
        .test-skip {
            background: #e2e3e5;
            color: #6c757d;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.3s ease;
        }
        .metric {
            text-align: center;
            margin: 15px 0;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        .metric-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 系統健康檢查儀表板</h1>
            <p>確保所有用戶都能正常使用宮廟記帳軟體</p>
        </div>

        <!-- 總體健康狀態 -->
        <div class="card" style="grid-column: 1 / -1;">
            <div class="card-header">
                <span class="card-icon">📊</span>
                <h2 class="card-title">總體健康狀態</h2>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;">
                <div class="metric">
                    <div class="metric-value" id="overall-score">--</div>
                    <div class="metric-label">健康評分</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="total-tests">--</div>
                    <div class="metric-label">檢查項目</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="passed-tests">--</div>
                    <div class="metric-label">通過項目</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="failed-tests">--</div>
                    <div class="metric-label">失敗項目</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="health-progress" style="width: 0%;"></div>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="btn btn-primary" onclick="runFullHealthCheck()">
                    🔍 執行完整健康檢查
                </button>
                <button class="btn btn-success" onclick="autoFixIssues()">
                    🔧 自動修復問題
                </button>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- IndexedDB 健康狀態 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🗄️</span>
                    <h3 class="card-title">IndexedDB 狀態</h3>
                </div>
                <div id="indexeddb-status">
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        等待檢查...
                    </div>
                </div>
                <button class="btn btn-warning" onclick="checkIndexedDB()">檢查 IndexedDB</button>
                <button class="btn btn-danger" onclick="fixIndexedDB()">修復 IndexedDB</button>
            </div>

            <!-- localStorage 健康狀態 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💾</span>
                    <h3 class="card-title">localStorage 狀態</h3>
                </div>
                <div id="localstorage-status">
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        等待檢查...
                    </div>
                </div>
                <button class="btn btn-primary" onclick="checkLocalStorage()">檢查 localStorage</button>
                <button class="btn btn-success" onclick="cleanupStorage()">清理儲存</button>
            </div>

            <!-- 類別系統狀態 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">📋</span>
                    <h3 class="card-title">類別系統狀態</h3>
                </div>
                <div id="category-status">
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        等待檢查...
                    </div>
                </div>
                <button class="btn btn-primary" onclick="checkCategories()">檢查類別</button>
                <button class="btn btn-success" onclick="fixCategories()">修復類別</button>
            </div>

            <!-- 瀏覽器兼容性 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🌐</span>
                    <h3 class="card-title">瀏覽器兼容性</h3>
                </div>
                <div id="browser-status">
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        等待檢查...
                    </div>
                </div>
                <button class="btn btn-primary" onclick="checkBrowserCompat()">檢查兼容性</button>
            </div>

            <!-- 功能測試 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🧪</span>
                    <h3 class="card-title">功能測試</h3>
                </div>
                <div id="function-tests">
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        等待測試...
                    </div>
                </div>
                <button class="btn btn-primary" onclick="runFunctionTests()">執行功能測試</button>
            </div>

            <!-- 用戶體驗監控 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">👥</span>
                    <h3 class="card-title">用戶體驗監控</h3>
                </div>
                <div id="ux-monitoring">
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        等待分析...
                    </div>
                </div>
                <button class="btn btn-primary" onclick="analyzeUX()">分析用戶體驗</button>
            </div>
        </div>

        <!-- 詳細測試結果 -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">📝</span>
                <h3 class="card-title">詳細檢查結果</h3>
            </div>
            <div id="detailed-results">
                <p>點擊上方「執行完整健康檢查」開始...</p>
            </div>
        </div>

        <!-- 修復建議 -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">💡</span>
                <h3 class="card-title">修復建議</h3>
            </div>
            <div id="fix-recommendations">
                <p>完成健康檢查後會顯示修復建議...</p>
            </div>
        </div>
    </div>

    <!-- 載入系統 -->
    <script src="temple-config.js"></script>
    <script src="category-manager.js"></script>
    <script src="privacy-protection.js"></script>
    <script src="emergency-category-fix.js"></script>

    <script>
        let healthCheckResults = {
            indexedDB: { status: 'pending', score: 0, issues: [] },
            localStorage: { status: 'pending', score: 0, issues: [] },
            categories: { status: 'pending', score: 0, issues: [] },
            browser: { status: 'pending', score: 0, issues: [] },
            functions: { status: 'pending', score: 0, issues: [] },
            ux: { status: 'pending', score: 0, issues: [] }
        };

        // 執行完整健康檢查
        async function runFullHealthCheck() {
            updateOverallStatus('檢查中...', 0);
            
            const checks = [
                checkIndexedDB,
                checkLocalStorage, 
                checkCategories,
                checkBrowserCompat,
                runFunctionTests,
                analyzeUX
            ];
            
            let completedChecks = 0;
            
            for (const check of checks) {
                try {
                    await check();
                    completedChecks++;
                    updateProgress((completedChecks / checks.length) * 100);
                } catch (error) {
                    console.error('健康檢查失敗:', error);
                }
                
                // 短暫延遲讓用戶看到進度
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            calculateOverallHealth();
            generateRecommendations();
        }

        // 檢查 IndexedDB
        async function checkIndexedDB() {
            const statusElement = document.getElementById('indexeddb-status');
            statusElement.innerHTML = '<div class="health-status status-warning">🔍 檢查中...</div>';
            
            const results = [];
            let score = 0;
            
            try {
                // 檢查 IndexedDB 支援
                if (!window.indexedDB) {
                    results.push({ test: 'IndexedDB支援', status: 'fail', message: '瀏覽器不支援IndexedDB' });
                } else {
                    results.push({ test: 'IndexedDB支援', status: 'pass', message: '瀏覽器支援IndexedDB' });
                    score += 20;
                }
                
                // 檢查資料庫是否存在
                const databases = await indexedDB.databases();
                const templeDB = databases.find(db => db.name === 'GuangqingTempleDB');
                
                if (templeDB) {
                    results.push({ test: '資料庫存在', status: 'pass', message: `資料庫版本: ${templeDB.version}` });
                    score += 20;
                    
                    // 檢查資料庫結構
                    const structureOK = await checkDBStructure();
                    if (structureOK) {
                        results.push({ test: '資料庫結構', status: 'pass', message: '所有索引正常' });
                        score += 30;
                    } else {
                        results.push({ test: '資料庫結構', status: 'fail', message: '缺少必要索引' });
                    }
                    
                    // 檢查資料完整性
                    const dataIntegrity = await checkDataIntegrity();
                    if (dataIntegrity) {
                        results.push({ test: '資料完整性', status: 'pass', message: '資料結構正常' });
                        score += 30;
                    } else {
                        results.push({ test: '資料完整性', status: 'fail', message: '資料可能損壞' });
                    }
                } else {
                    results.push({ test: '資料庫存在', status: 'skip', message: '資料庫尚未創建' });
                    score += 10; // 新用戶正常情況
                }
                
            } catch (error) {
                results.push({ test: 'IndexedDB檢查', status: 'fail', message: error.message });
            }
            
            healthCheckResults.indexedDB = { status: score >= 70 ? 'good' : score >= 40 ? 'warning' : 'error', score, issues: results.filter(r => r.status === 'fail') };
            updateStatusDisplay('indexeddb-status', healthCheckResults.indexedDB, results);
        }

        // 檢查 localStorage
        async function checkLocalStorage() {
            const statusElement = document.getElementById('localstorage-status');
            statusElement.innerHTML = '<div class="health-status status-warning">🔍 檢查中...</div>';
            
            const results = [];
            let score = 0;
            
            try {
                // 檢查 localStorage 支援
                if (!window.localStorage) {
                    results.push({ test: 'localStorage支援', status: 'fail', message: '瀏覽器不支援localStorage' });
                } else {
                    results.push({ test: 'localStorage支援', status: 'pass', message: '瀏覽器支援localStorage' });
                    score += 25;
                }
                
                // 檢查儲存空間
                try {
                    const testKey = 'health-check-test';
                    const testData = 'x'.repeat(1024); // 1KB測試資料
                    localStorage.setItem(testKey, testData);
                    localStorage.removeItem(testKey);
                    results.push({ test: '儲存空間', status: 'pass', message: '儲存空間正常' });
                    score += 25;
                } catch (error) {
                    results.push({ test: '儲存空間', status: 'fail', message: '儲存空間不足' });
                }
                
                // 檢查關鍵資料
                const criticalKeys = [
                    'custom-income-categories',
                    'custom-expense-categories',
                    'temple-config'
                ];
                
                let foundKeys = 0;
                criticalKeys.forEach(key => {
                    const value = localStorage.getItem(key);
                    if (value) {
                        foundKeys++;
                        try {
                            JSON.parse(value);
                            results.push({ test: `${key}資料`, status: 'pass', message: '資料格式正常' });
                        } catch (error) {
                            results.push({ test: `${key}資料`, status: 'fail', message: 'JSON格式錯誤' });
                        }
                    }
                });
                
                score += (foundKeys / criticalKeys.length) * 50;
                
            } catch (error) {
                results.push({ test: 'localStorage檢查', status: 'fail', message: error.message });
            }
            
            healthCheckResults.localStorage = { status: score >= 70 ? 'good' : score >= 40 ? 'warning' : 'error', score, issues: results.filter(r => r.status === 'fail') };
            updateStatusDisplay('localstorage-status', healthCheckResults.localStorage, results);
        }

        // 檢查類別系統
        async function checkCategories() {
            const statusElement = document.getElementById('category-status');
            statusElement.innerHTML = '<div class="health-status status-warning">🔍 檢查中...</div>';
            
            const results = [];
            let score = 0;
            
            try {
                // 檢查預設類別
                const defaultIncomeCategories = ['香油錢', '點光明燈', '屬名紅包'];
                results.push({ test: '預設收入類別', status: 'pass', message: `${defaultIncomeCategories.length}個預設類別` });
                score += 30;
                
                // 檢查自訂類別儲存
                const customIncomeStr = localStorage.getItem('custom-income-categories');
                if (customIncomeStr) {
                    try {
                        const customCategories = JSON.parse(customIncomeStr);
                        results.push({ test: '自訂類別載入', status: 'pass', message: `${customCategories.length}個自訂類別` });
                        score += 35;
                        
                        // 檢查發財金類別
                        const hasFacai = customCategories.some(cat => cat.name === '發財金');
                        if (hasFacai) {
                            results.push({ test: '發財金類別', status: 'pass', message: '發財金類別存在' });
                            score += 35;
                        } else {
                            results.push({ test: '發財金類別', status: 'fail', message: '發財金類別遺失' });
                        }
                    } catch (error) {
                        results.push({ test: '自訂類別載入', status: 'fail', message: 'JSON解析失敗' });
                    }
                } else {
                    results.push({ test: '自訂類別載入', status: 'skip', message: '無自訂類別' });
                    score += 20; // 新用戶正常情況
                }
                
            } catch (error) {
                results.push({ test: '類別系統檢查', status: 'fail', message: error.message });
            }
            
            healthCheckResults.categories = { status: score >= 70 ? 'good' : score >= 40 ? 'warning' : 'error', score, issues: results.filter(r => r.status === 'fail') };
            updateStatusDisplay('category-status', healthCheckResults.categories, results);
        }

        // 檢查瀏覽器兼容性
        async function checkBrowserCompat() {
            const statusElement = document.getElementById('browser-status');
            statusElement.innerHTML = '<div class="health-status status-warning">🔍 檢查中...</div>';
            
            const results = [];
            let score = 0;
            
            // 檢查必要的API支援
            const requiredAPIs = [
                { name: 'localStorage', check: () => !!window.localStorage },
                { name: 'indexedDB', check: () => !!window.indexedDB },
                { name: 'fetch', check: () => !!window.fetch },
                { name: 'Promise', check: () => !!window.Promise },
                { name: 'crypto', check: () => !!window.crypto },
                { name: 'ServiceWorker', check: () => 'serviceWorker' in navigator }
            ];
            
            requiredAPIs.forEach(api => {
                if (api.check()) {
                    results.push({ test: api.name, status: 'pass', message: `${api.name} 支援正常` });
                    score += (100 / requiredAPIs.length);
                } else {
                    results.push({ test: api.name, status: 'fail', message: `${api.name} 不支援` });
                }
            });
            
            // 檢查瀏覽器版本
            const userAgent = navigator.userAgent;
            results.push({ test: '瀏覽器資訊', status: 'pass', message: userAgent });
            
            healthCheckResults.browser = { status: score >= 80 ? 'good' : score >= 60 ? 'warning' : 'error', score, issues: results.filter(r => r.status === 'fail') };
            updateStatusDisplay('browser-status', healthCheckResults.browser, results);
        }

        // 執行功能測試
        async function runFunctionTests() {
            const statusElement = document.getElementById('function-tests');
            statusElement.innerHTML = '<div class="health-status status-warning">🧪 測試中...</div>';
            
            const results = [];
            let score = 0;
            
            const tests = [
                {
                    name: '類別新增測試',
                    test: () => {
                        const testCategory = { id: Date.now(), name: '測試類別', color: '#000000' };
                        localStorage.setItem('test-categories', JSON.stringify([testCategory]));
                        const saved = JSON.parse(localStorage.getItem('test-categories'));
                        localStorage.removeItem('test-categories');
                        return saved.length > 0 && saved[0].name === '測試類別';
                    }
                },
                {
                    name: '資料加密測試',
                    test: () => {
                        if (window.privacyManager) {
                            const testData = { name: '測試' };
                            const encrypted = window.privacyManager.encryptPersonalData(testData);
                            return encrypted && encrypted.name !== '測試';
                        }
                        return false;
                    }
                },
                {
                    name: '宮廟配置測試',
                    test: () => {
                        if (window.templeConfig) {
                            const config = window.templeConfig.getConfig();
                            return config && typeof config === 'object';
                        }
                        return false;
                    }
                },
                {
                    name: '紅包系統測試',
                    test: () => {
                        if (window.donationManager) {
                            const report = window.donationManager.getFeatureReport();
                            return report && report.currentTier;
                        }
                        return false;
                    }
                }
            ];
            
            for (const test of tests) {
                try {
                    const passed = test.test();
                    if (passed) {
                        results.push({ test: test.name, status: 'pass', message: '測試通過' });
                        score += (100 / tests.length);
                    } else {
                        results.push({ test: test.name, status: 'fail', message: '測試失敗' });
                    }
                } catch (error) {
                    results.push({ test: test.name, status: 'fail', message: `測試錯誤: ${error.message}` });
                }
            }
            
            healthCheckResults.functions = { status: score >= 75 ? 'good' : score >= 50 ? 'warning' : 'error', score, issues: results.filter(r => r.status === 'fail') };
            updateStatusDisplay('function-tests', healthCheckResults.functions, results);
        }

        // 檢查資料庫結構
        async function checkDBStructure() {
            return new Promise((resolve) => {
                try {
                    const request = indexedDB.open('GuangqingTempleDB');
                    request.onsuccess = (event) => {
                        const db = event.target.result;
                        
                        // 檢查 syncQueue 索引
                        if (db.objectStoreNames.contains('syncQueue')) {
                            const transaction = db.transaction(['syncQueue'], 'readonly');
                            const store = transaction.objectStore('syncQueue');
                            const hasIndex = store.indexNames.contains('synced');
                            db.close();
                            resolve(hasIndex);
                        } else {
                            db.close();
                            resolve(false);
                        }
                    };
                    request.onerror = () => resolve(false);
                } catch (error) {
                    resolve(false);
                }
            });
        }

        // 檢查資料完整性
        async function checkDataIntegrity() {
            return new Promise((resolve) => {
                try {
                    const request = indexedDB.open('GuangqingTempleDB');
                    request.onsuccess = (event) => {
                        const db = event.target.result;
                        // 簡單的完整性檢查
                        resolve(db.objectStoreNames.length > 0);
                        db.close();
                    };
                    request.onerror = () => resolve(false);
                } catch (error) {
                    resolve(false);
                }
            });
        }

        // 分析用戶體驗
        async function analyzeUX() {
            const statusElement = document.getElementById('ux-monitoring');
            statusElement.innerHTML = '<div class="health-status status-warning">📊 分析中...</div>';
            
            const results = [];
            let score = 0;
            
            // 檢查頁面載入時間
            const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
            if (loadTime < 3000) {
                results.push({ test: '頁面載入速度', status: 'pass', message: `${loadTime}ms - 良好` });
                score += 25;
            } else {
                results.push({ test: '頁面載入速度', status: 'warning', message: `${loadTime}ms - 較慢` });
                score += 15;
            }
            
            // 檢查錯誤日誌
            const errorCount = window.console.error.length || 0;
            if (errorCount === 0) {
                results.push({ test: 'JavaScript錯誤', status: 'pass', message: '無JavaScript錯誤' });
                score += 25;
            } else {
                results.push({ test: 'JavaScript錯誤', status: 'fail', message: `${errorCount}個錯誤` });
            }
            
            // 檢查響應式設計
            const isMobile = window.innerWidth < 768;
            results.push({ test: '響應式設計', status: 'pass', message: isMobile ? '行動版顯示' : '桌面版顯示' });
            score += 25;
            
            // 檢查可訪問性
            const hasAltText = document.querySelectorAll('img[alt]').length > 0;
            results.push({ test: '可訪問性', status: 'pass', message: '基本可訪問性支援' });
            score += 25;
            
            healthCheckResults.ux = { status: score >= 75 ? 'good' : score >= 50 ? 'warning' : 'error', score, issues: results.filter(r => r.status === 'fail') };
            updateStatusDisplay('ux-monitoring', healthCheckResults.ux, results);
        }

        // 更新狀態顯示
        function updateStatusDisplay(elementId, result, details) {
            const element = document.getElementById(elementId);
            const statusClass = `status-${result.status === 'good' ? 'good' : result.status === 'warning' ? 'warning' : 'error'}`;
            const indicatorClass = `indicator-${result.status === 'good' ? 'good' : result.status === 'warning' ? 'warning' : 'error'}`;
            
            let html = `
                <div class="health-status ${statusClass}">
                    <span class="status-indicator ${indicatorClass}"></span>
                    ${result.status === 'good' ? '✅ 正常' : result.status === 'warning' ? '⚠️ 警告' : '❌ 錯誤'} 
                    (評分: ${Math.round(result.score)}/100)
                </div>
            `;
            
            if (details && details.length > 0) {
                html += '<div style="margin-top: 10px;">';
                details.forEach(detail => {
                    const testClass = detail.status === 'pass' ? 'test-pass' : detail.status === 'fail' ? 'test-fail' : 'test-skip';
                    html += `<div class="test-result ${testClass}">${detail.test}: ${detail.message}</div>`;
                });
                html += '</div>';
            }
            
            element.innerHTML = html;
        }

        // 計算總體健康狀況
        function calculateOverallHealth() {
            const results = Object.values(healthCheckResults);
            const totalScore = results.reduce((sum, result) => sum + result.score, 0) / results.length;
            const totalTests = results.length;
            const passedTests = results.filter(r => r.status === 'good').length;
            const failedTests = results.filter(r => r.status === 'error').length;
            
            document.getElementById('overall-score').textContent = Math.round(totalScore) + '%';
            document.getElementById('total-tests').textContent = totalTests;
            document.getElementById('passed-tests').textContent = passedTests;
            document.getElementById('failed-tests').textContent = failedTests;
            
            updateProgress(totalScore);
        }

        // 更新進度條
        function updateProgress(percentage) {
            document.getElementById('health-progress').style.width = percentage + '%';
        }

        // 更新總體狀態
        function updateOverallStatus(message, score) {
            document.getElementById('overall-score').textContent = typeof score === 'number' ? score + '%' : message;
        }

        // 生成修復建議
        function generateRecommendations() {
            const element = document.getElementById('fix-recommendations');
            const allIssues = Object.values(healthCheckResults).flatMap(result => result.issues);
            
            if (allIssues.length === 0) {
                element.innerHTML = `
                    <div class="health-status status-good">
                        <span class="status-indicator indicator-good"></span>
                        🎉 系統運行良好，無需修復！
                    </div>
                `;
                return;
            }
            
            let html = '<h4>🔧 建議的修復步驟：</h4>';
            
            // IndexedDB 問題
            const indexedDBIssues = healthCheckResults.indexedDB.issues;
            if (indexedDBIssues.length > 0) {
                html += `
                    <div class="health-status status-error">
                        <span class="status-indicator indicator-error"></span>
                        <strong>IndexedDB 問題：</strong>
                        <a href="indexeddb-reset.html" class="btn btn-danger" style="margin-left: 10px;">立即修復</a>
                    </div>
                `;
            }
            
            // 類別問題
            const categoryIssues = healthCheckResults.categories.issues;
            if (categoryIssues.length > 0) {
                html += `
                    <div class="health-status status-error">
                        <span class="status-indicator indicator-error"></span>
                        <strong>類別系統問題：</strong>
                        <a href="facai-fix.html" class="btn btn-success" style="margin-left: 10px;">修復類別</a>
                    </div>
                `;
            }
            
            // localStorage 問題
            const storageIssues = healthCheckResults.localStorage.issues;
            if (storageIssues.length > 0) {
                html += `
                    <div class="health-status status-warning">
                        <span class="status-indicator indicator-warning"></span>
                        <strong>儲存問題：</strong>
                        <button class="btn btn-warning" onclick="cleanupStorage()" style="margin-left: 10px;">清理儲存</button>
                    </div>
                `;
            }
            
            element.innerHTML = html;
        }

        // 自動修復問題
        async function autoFixIssues() {
            if (confirm('🤖 確定要執行自動修復嗎？\n\n這會嘗試修復所有檢測到的問題。')) {
                updateOverallStatus('自動修復中...', 0);
                
                // 修復 IndexedDB
                if (healthCheckResults.indexedDB.status === 'error') {
                    await fixIndexedDB();
                }
                
                // 修復類別
                if (healthCheckResults.categories.status === 'error') {
                    await fixCategories();
                }
                
                // 清理儲存
                if (healthCheckResults.localStorage.status === 'error') {
                    await cleanupStorage();
                }
                
                // 重新檢查
                setTimeout(() => {
                    runFullHealthCheck();
                }, 2000);
            }
        }

        // 修復函數
        async function fixIndexedDB() {
            window.open('indexeddb-reset.html', '_blank');
        }

        async function fixCategories() {
            window.open('facai-fix.html', '_blank');
        }

        async function cleanupStorage() {
            try {
                const keysToClean = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.includes('temp-') || key.includes('test-') || key.includes('debug-')) {
                        keysToClean.push(key);
                    }
                }
                
                keysToClean.forEach(key => localStorage.removeItem(key));
                alert(`🧹 已清理 ${keysToClean.length} 個臨時項目`);
                
                // 重新檢查
                setTimeout(checkLocalStorage, 500);
            } catch (error) {
                alert('清理失敗：' + error.message);
            }
        }

        // 頁面載入時自動執行基本檢查
        window.addEventListener('load', function() {
            setTimeout(() => {
                runFullHealthCheck();
            }, 1000);
        });
    </script>
