<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>發財金類別修復工具</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .header {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 32px;
            color: #8b4513;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #FFD700;
            color: #8b4513;
        }
        .btn-primary:hover {
            background: #FFA500;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #1e7e34;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #545b62;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .steps {
            text-align: left;
            margin: 30px 0;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .step {
            margin: 10px 0;
            padding: 10px;
            border-left: 4px solid #FFD700;
            background: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">💰</div>
        <div class="title">發財金類別修復工具</div>
        <div class="description">
            如果您的「發財金」收入類別在重新載入後消失，這個工具可以立即幫您修復。
        </div>

        <div id="status" class="status status-info">
            🔍 正在檢查發財金類別狀態...
        </div>

        <div style="margin: 30px 0;">
            <button class="btn btn-primary" onclick="checkFacaiStatus()">
                🔍 檢查發財金狀態
            </button>
            <button class="btn btn-success" onclick="fixFacaiCategory()">
                🛠️ 立即修復發財金
            </button>
            <button class="btn btn-secondary" onclick="showAllCategories()">
                📋 顯示所有類別
            </button>
        </div>

        <div class="steps">
            <h3 style="color: #8b4513; margin-bottom: 15px;">🔧 修復步驟：</h3>
            <div class="step">
                <strong>步驟 1：</strong>點擊「檢查發財金狀態」確認問題
            </div>
            <div class="step">
                <strong>步驟 2：</strong>點擊「立即修復發財金」執行修復
            </div>
            <div class="step">
                <strong>步驟 3：</strong>返回主頁面，發財金類別應該已恢復
            </div>
        </div>

        <div style="margin-top: 30px;">
            <a href="index-enhanced.html" class="btn btn-secondary">
                ← 返回主頁面
            </a>
        </div>

        <div id="debug-info" style="margin-top: 30px; display: none;">
            <h4>🔍 除錯資訊</h4>
            <div id="debug-content" style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: left; font-size: 12px; max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        // 檢查發財金狀態
        function checkFacaiStatus() {
            const statusElement = document.getElementById('status');
            const debugElement = document.getElementById('debug-info');
            const debugContent = document.getElementById('debug-content');
            
            let debugInfo = [];
            let facaiFound = false;
            
            // 檢查所有可能的儲存位置
            const storageKeys = [
                'custom-income-categories',
                'temple-default-custom-income-categories', 
                'temple-income-categories',
                'emergency-income-categories'
            ];
            
            debugInfo.push('🔍 檢查所有儲存位置：');
            
            storageKeys.forEach(key => {
                const value = localStorage.getItem(key);
                if (value) {
                    try {
                        const categories = JSON.parse(value);
                        const facai = categories.find(cat => cat.name === '發財金');
                        if (facai) {
                            facaiFound = true;
                            debugInfo.push(`✅ ${key}: 找到發財金類別`);
                            debugInfo.push(`   ID: ${facai.id}, 顏色: ${facai.color}`);
                        } else {
                            debugInfo.push(`❌ ${key}: 未找到發財金類別 (共${categories.length}個類別)`);
                        }
                    } catch (error) {
                        debugInfo.push(`❌ ${key}: JSON解析失敗 - ${error.message}`);
                    }
                } else {
                    debugInfo.push(`⚪ ${key}: 無資料`);
                }
            });
            
            // 更新狀態顯示
            if (facaiFound) {
                statusElement.className = 'status status-success';
                statusElement.innerHTML = '✅ 發財金類別存在！可能是載入順序問題。';
            } else {
                statusElement.className = 'status status-error';
                statusElement.innerHTML = '❌ 發財金類別遺失！需要立即修復。';
            }
            
            // 顯示除錯資訊
            debugContent.innerHTML = debugInfo.join('<br>');
            debugElement.style.display = 'block';
        }
        
        // 修復發財金類別
        function fixFacaiCategory() {
            const statusElement = document.getElementById('status');
            
            try {
                console.log('🛠️ 開始修復發財金類別...');
                
                // 創建發財金類別
                const facaiCategory = {
                    id: Date.now(),
                    name: '發財金',
                    color: '#FFD700',
                    description: '發財金收入',
                    isCustom: true,
                    isDefault: false,
                    createdAt: new Date().toISOString(),
                    fixedAt: new Date().toISOString(),
                    fixedBy: 'emergency-tool'
                };
                
                // 儲存到所有可能的位置
                const allKeys = [
                    'custom-income-categories',
                    'temple-default-custom-income-categories',
                    'temple-income-categories',
                    'emergency-income-categories',
                    'facai-backup-categories'
                ];
                
                let successCount = 0;
                
                allKeys.forEach(key => {
                    try {
                        // 取得現有類別
                        let existingCategories = [];
                        const existing = localStorage.getItem(key);
                        if (existing) {
                            existingCategories = JSON.parse(existing);
                        }
                        
                        // 檢查是否已有發財金
                        const hasFacai = existingCategories.some(cat => cat.name === '發財金');
                        if (!hasFacai) {
                            existingCategories.push(facaiCategory);
                            localStorage.setItem(key, JSON.stringify(existingCategories));
                            successCount++;
                            console.log(`✅ 發財金已儲存到 ${key}`);
                        } else {
                            console.log(`ℹ️ ${key} 已有發財金類別`);
                        }
                    } catch (error) {
                        console.error(`儲存到 ${key} 失敗:`, error);
                    }
                });
                
                if (successCount > 0) {
                    statusElement.className = 'status status-success';
                    statusElement.innerHTML = `✅ 發財金類別修復成功！已儲存到 ${successCount} 個位置。`;
                    
                    // 顯示成功訊息並提供返回選項
                    setTimeout(() => {
                        if (confirm('🎉 發財金類別修復完成！\n\n是否要返回主頁面查看結果？')) {
                            window.location.href = 'index-enhanced.html';
                        }
                    }, 1000);
                } else {
                    statusElement.className = 'status status-error';
                    statusElement.innerHTML = '❌ 修復失敗，請聯絡技術支援。';
                }
                
            } catch (error) {
                console.error('修復發財金類別失敗:', error);
                statusElement.className = 'status status-error';
                statusElement.innerHTML = '❌ 修復過程發生錯誤：' + error.message;
            }
        }
        
        // 顯示所有類別
        function showAllCategories() {
            const debugElement = document.getElementById('debug-info');
            const debugContent = document.getElementById('debug-content');
            
            let allCategories = [];
            
            // 收集所有儲存的類別
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.includes('categor')) {
                    const value = localStorage.getItem(key);
                    try {
                        const parsed = JSON.parse(value);
                        if (Array.isArray(parsed)) {
                            allCategories.push({
                                source: key,
                                categories: parsed
                            });
                        }
                    } catch (error) {
                        allCategories.push({
                            source: key,
                            error: error.message
                        });
                    }
                }
            }
            
            let html = '<h4>📋 所有類別資料：</h4>';
            allCategories.forEach(item => {
                html += `<div style="margin: 10px 0; padding: 10px; background: white; border-radius: 5px;">`;
                html += `<strong>${item.source}</strong><br>`;
                if (item.error) {
                    html += `<span style="color: red;">錯誤: ${item.error}</span>`;
                } else {
                    html += `類別數量: ${item.categories.length}<br>`;
                    item.categories.forEach(cat => {
                        const isFacai = cat.name === '發財金';
                        html += `<span style="color: ${isFacai ? 'green' : '#666'}; font-weight: ${isFacai ? 'bold' : 'normal'};">• ${cat.name}</span><br>`;
                    });
                }
                html += '</div>';
            });
            
            debugContent.innerHTML = html;
            debugElement.style.display = 'block';
        }
        
        // 頁面載入時自動檢查
        window.addEventListener('load', function() {
            setTimeout(checkFacaiStatus, 1000);
        });
    </script>
</body>
</html>
