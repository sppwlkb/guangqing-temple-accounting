<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機版雲端同步測試</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .info-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .info-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-item {
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .action-card:hover,
        .action-card:active {
            border-color: #409eff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(64, 158, 255, 0.3);
        }

        .action-icon {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        .action-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .cloud-sync .action-icon {
            color: #409eff;
        }

        .cloud-download .action-icon {
            color: #67c23a;
        }

        .test-result {
            background: #e7f3ff;
            border: 1px solid #b3d8ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #333;
        }

        .test-success {
            background: #f0f9ff;
            border-color: #67c23a;
            color: #67c23a;
        }

        .test-error {
            background: #fef0f0;
            border-color: #f56c6c;
            color: #f56c6c;
        }

        /* 確保手機版正確顯示 */
        @media (max-width: 480px) {
            .container {
                margin: 10px;
                padding: 20px 15px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 25px;
            }

            .actions-grid {
                gap: 12px;
            }

            .action-card {
                padding: 15px 10px;
            }

            .action-icon {
                font-size: 32px;
                margin-bottom: 8px;
            }

            .action-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 手機版雲端同步測試</h1>
        
        <div class="info-section">
            <h3>🔍 顯示檢測</h3>
            <div class="info-item">螢幕寬度: <span id="screenWidth"></span>px</div>
            <div class="info-item">視窗寬度: <span id="windowWidth"></span>px</div>
            <div class="info-item">裝置像素比: <span id="devicePixelRatio"></span></div>
            <div class="info-item">用戶代理: <span id="userAgent"></span></div>
        </div>

        <div class="actions-grid">
            <div class="action-card cloud-sync" onclick="testCloudSync()">
                <div class="action-icon">☁️</div>
                <div class="action-title">雲端備份</div>
            </div>

            <div class="action-card cloud-download" onclick="testCloudDownload()">
                <div class="action-icon">📥</div>
                <div class="action-title">從雲端同步</div>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="window.location.href='index.html'" style="
                background: #409eff;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
                touch-action: manipulation;
            ">返回主程式</button>
        </div>

        <div id="testResult"></div>
    </div>

    <script>
        // 顯示裝置資訊
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('screenWidth').textContent = screen.width;
            document.getElementById('windowWidth').textContent = window.innerWidth;
            document.getElementById('devicePixelRatio').textContent = window.devicePixelRatio;
            document.getElementById('userAgent').textContent = navigator.userAgent.includes('Mobile') ? '手機' : '電腦';
        });

        function showTestResult(message, type = 'info') {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = `<div class="test-result test-${type}">${message}</div>`;
        }

        function testCloudSync() {
            showTestResult('✅ 雲端備份按鈕顯示正常！<br>👆 按鈕可以正確點擊<br>📱 手機版排版正確', 'success');
            
            // 模擬實際功能測試
            setTimeout(() => {
                showTestResult('✅ 雲端備份功能測試完成！<br><br>📋 測試結果：<br>• 按鈕顯示：正常<br>• 點擊響應：正常<br>• 圖案顯示：正常 ☁️<br>• 文字顯示：正常', 'success');
            }, 1000);
        }

        function testCloudDownload() {
            showTestResult('✅ 雲端同步按鈕顯示正常！<br>👆 按鈕可以正確點擊<br>📱 手機版排版正確', 'success');
            
            // 模擬實際功能測試
            setTimeout(() => {
                showTestResult('✅ 從雲端同步功能測試完成！<br><br>📋 測試結果：<br>• 按鈕顯示：正常<br>• 點擊響應：正常<br>• 圖案顯示：正常 📥<br>• 文字顯示：正常', 'success');
            }, 1000);
        }

        // 檢查觸控支持
        if ('ontouchstart' in window) {
            console.log('✅ 觸控裝置支持正常');
        }

        // 檢查響應式設計
        function checkResponsive() {
            const width = window.innerWidth;
            if (width <= 480) {
                console.log('✅ 手機版樣式已啟用');
            } else if (width <= 768) {
                console.log('✅ 平板版樣式已啟用');  
            } else {
                console.log('✅ 桌面版樣式已啟用');
            }
        }

        window.addEventListener('resize', checkResponsive);
        checkResponsive();
    </script>
</body>
</html>
