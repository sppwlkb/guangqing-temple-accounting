name: 🚀 自動部署到 GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 檢出程式碼
      uses: actions/checkout@v4
      
    - name: 🔧 設置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 安裝依賴
      run: |
        npm ci || npm install --legacy-peer-deps
        
    - name: 🏗️ 構建專案
      run: |
        # 如果有構建腳本就使用，否則直接複製檔案
        if npm run build 2>/dev/null; then
          echo "✅ 使用 npm run build 構建成功"
        else
          echo "📁 直接複製檔案進行部署"
          mkdir -p dist
          cp index.html dist/
          cp style.css dist/
          cp app.js dist/
          cp firebase-config.js dist/
          cp cloud-sync.js dist/
          cp offline-storage.js dist/
          cp manifest.json dist/
          cp service-worker.js dist/
          echo "" > dist/.nojekyll
        fi
        
    - name: 🌐 部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        publish_branch: gh-pages
        force_orphan: true
        
    - name: 📊 部署狀態
      if: success()
      run: |
        echo "🎉 部署成功！"
        echo "🌐 網站將在幾分鐘內更新：https://${{ github.repository_owner }}.github.io/guangqing-temple-accounting/"
        
    - name: ❌ 部署失敗通知
      if: failure()
      run: |
        echo "❌ 部署失敗，請檢查錯誤日誌" 