name: 🚀 自動部署到 GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 設定權限
permissions:
  contents: write
  pages: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 檢出程式碼
      uses: actions/checkout@v4
        
    - name: 🏗️ 準備部署檔案
      run: |
        echo "📁 準備部署檔案"
        mkdir -p dist
        
        # 複製所有檔案
        cp -r * dist/ 2>/dev/null || true
        
        # 確保關鍵檔案存在
        cp index.html dist/ 2>/dev/null || true
        cp index-enhanced.html dist/ 2>/dev/null || true
        cp cloud-sync-test.html dist/ 2>/dev/null || true
        cp test-enhanced-sync.html dist/ 2>/dev/null || true
        cp firebase-config.js dist/ 2>/dev/null || true
        cp offline-storage.js dist/ 2>/dev/null || true
        
        # 移除不需要的檔案
        rm -rf dist/.git dist/.github dist/node_modules 2>/dev/null || true
        
        # GitHub Pages 配置
        echo "" > dist/.nojekyll
        
        echo "✅ 檔案準備完成"
        ls -la dist/ | head -20
        
    - name: 🌐 部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        publish_branch: gh-pages
        force_orphan: true
        
    - name: 📊 部署狀態
      if: success()
      run: |
        echo "🎉 部署成功！"
        echo "🌐 網站將在幾分鐘內更新：https://${{ github.repository_owner }}.github.io/guangqing-temple-accounting/"
        
    - name: ❌ 部署失敗通知
      if: failure()
      run: |
        echo "❌ 部署失敗，請檢查錯誤日誌" 