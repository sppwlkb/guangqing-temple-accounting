name: 🚀 自動部署到 GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 檢出程式碼
      uses: actions/checkout@v4
      
    - name: 🔧 設置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 安裝依賴
      run: |
        npm ci || npm install --legacy-peer-deps
        
    - name: 🏗️ 構建專案
      run: |
        # 如果有構建腳本就使用，否則直接複製檔案
        if npm run build 2>/dev/null; then
          echo "✅ 使用 npm run build 構建成功"
        else
          echo "📁 直接複製檔案進行部署"
          mkdir -p dist
          
          # 複製基本檔案
          cp *.html dist/ 2>/dev/null || true
          cp *.css dist/ 2>/dev/null || true
          cp *.js dist/ 2>/dev/null || true
          cp *.json dist/ 2>/dev/null || true
          
          # 確保關鍵檔案存在
          cp index.html dist/ 2>/dev/null || true
          cp index-enhanced.html dist/ 2>/dev/null || true
          cp style.css dist/ 2>/dev/null || true
          cp app.js dist/ 2>/dev/null || true
          cp firebase-config.js dist/ 2>/dev/null || true
          cp cloud-sync.js dist/ 2>/dev/null || true
          cp offline-storage.js dist/ 2>/dev/null || true
          cp manifest.json dist/ 2>/dev/null || true
          cp service-worker.js dist/ 2>/dev/null || true
          
          # 複製所有修復工具
          cp facai-fix.html dist/ 2>/dev/null || true
          cp indexeddb-reset.html dist/ 2>/dev/null || true
          cp category-repair-tool.html dist/ 2>/dev/null || true
          cp system-health-dashboard.html dist/ 2>/dev/null || true
          cp temple-deployment-generator.html dist/ 2>/dev/null || true
          cp donation-demo.html dist/ 2>/dev/null || true
          cp privacy-policy.html dist/ 2>/dev/null || true
          cp privacy-dashboard.html dist/ 2>/dev/null || true
          cp privacy-quick-access.html dist/ 2>/dev/null || true
          
          # 複製所有JavaScript系統
          cp temple-config.js dist/ 2>/dev/null || true
          cp donation-system.js dist/ 2>/dev/null || true
          cp category-manager.js dist/ 2>/dev/null || true
          cp emergency-category-fix.js dist/ 2>/dev/null || true
          cp user-support-system.js dist/ 2>/dev/null || true
          cp premium-support.js dist/ 2>/dev/null || true
          cp privacy-protection.js dist/ 2>/dev/null || true
          cp access-control.js dist/ 2>/dev/null || true
          cp cloud-sync-manager.js dist/ 2>/dev/null || true
          cp qrcode-generator.js dist/ 2>/dev/null || true
          
          # GitHub Pages 配置
          echo "" > dist/.nojekyll
          
          echo "✅ 所有檔案已複製到 dist 目錄"
          ls -la dist/
        fi
        
    - name: 🌐 部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        publish_branch: gh-pages
        force_orphan: true
        
    - name: 📊 部署狀態
      if: success()
      run: |
        echo "🎉 部署成功！"
        echo "🌐 網站將在幾分鐘內更新：https://${{ github.repository_owner }}.github.io/guangqing-temple-accounting/"
        
    - name: ❌ 部署失敗通知
      if: failure()
      run: |
        echo "❌ 部署失敗，請檢查錯誤日誌" 